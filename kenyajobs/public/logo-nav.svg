<svg width="260" height="44" viewBox="0 0 260 44" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JobsWorldwide</title>
  <defs>
    <clipPath id="gc">
      <circle cx="22" cy="22" r="19"/>
    </clipPath>
    <linearGradient id="gBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="22" cy="22" r="19" fill="url(#gBg)"/>

  <!-- Grid lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.25">
    <ellipse cx="22" cy="22" rx="19" ry="6"/>
    <ellipse cx="22" cy="22" rx="19" ry="12"/>
    <line x1="3" y1="22" x2="41" y2="22"/>
    <ellipse cx="22" cy="22" rx="6" ry="19"/>
    <ellipse cx="22" cy="22" rx="12" ry="19"/>
    <line x1="22" y1="3" x2="22" y2="41"/>
  </g>

  <!-- Continent blobs -->
  <g clip-path="url(#gc)" opacity="0.7">
    <path d="M25 13 Q29 11 31 15 Q33 20 31 26 Q29 30 25 30 Q21 30 20 25 Q19 19 21 14 Q23 12 25 13Z" fill="#60A5FA"/>
    <path d="M13 12 Q17 10 20 12 Q21 16 18 18 Q14 18 13 15 Q12 12 13 12Z" fill="#93C5FD"/>
    <path d="M6 19 Q9 17 11 20 Q12 24 10 26 Q7 26 6 23 Q5 20 6 19Z" fill="#60A5FA"/>
  </g>

  <!-- Sheen -->
  <ellipse cx="15" cy="14" rx="11" ry="8" fill="url(#sheen)" clip-path="url(#gc)"/>

  <!-- Globe ring -->
  <circle cx="22" cy="22" r="19" fill="none" stroke="#1D4ED8" stroke-width="0.8"/>

  <!-- Pin -->
  <circle cx="28" cy="17" r="5" fill="#ffffff"/>
  <circle cx="28" cy="17" r="2.8" fill="#2563EB"/>
  <circle cx="28" cy="17" r="1.4" fill="#ffffff"/>
  <line x1="28" y1="22" x2="28" y2="28" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="28" cy="29.5" r="1.5" fill="#ffffff"/>

  <!-- Jobs wordmark -->
  <text x="50" y="20"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-weight="700"
        fill="#0F172A"
        letter-spacing="-0.5">Jobs</text>

  <!-- Worldwide -->
  <text x="50" y="34"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        font-weight="400"
        fill="#2563EB"
        letter-spacing="2.5">Worldwide</text>

  <!-- Tagline -->
  <text x="138" y="34"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9"
        font-weight="400"
        fill="#94A3B8"
        letter-spacing="0.5">Find your next opportunity, anywhere</text>

  <!-- Divider between Jobs and Worldwide row -->
  <line x1="50" y1="23" x2="130" y2="23" stroke="#E2E8F0" stroke-width="0.8"/>
</svg>
