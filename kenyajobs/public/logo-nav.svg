<svg width="200" height="40" viewBox="0 0 200 40" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JobsWorldwide</title>
  <defs>
    <clipPath id="gc">
      <circle cx="20" cy="20" r="17"/>
    </clipPath>
    <linearGradient id="gBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="20" cy="20" r="17" fill="url(#gBg)"/>

  <!-- Grid lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.25">
    <ellipse cx="20" cy="20" rx="17" ry="6"/>
    <ellipse cx="20" cy="20" rx="17" ry="12"/>
    <line x1="3" y1="20" x2="37" y2="20"/>
    <ellipse cx="20" cy="20" rx="6" ry="17"/>
    <ellipse cx="20" cy="20" rx="12" ry="17"/>
    <line x1="20" y1="3" x2="20" y2="37"/>
  </g>

  <!-- Continent blobs -->
  <g clip-path="url(#gc)" opacity="0.7">
    <path d="M22 13 Q25 11 27 14 Q29 18 28 23 Q27 27 24 27 Q21 27 20 23 Q19 18 20 14 Q21 12 22 13Z" fill="#60A5FA"/>
    <path d="M13 12 Q16 10 18 12 Q19 15 17 17 Q14 17 13 14 Q12 12 13 12Z" fill="#93C5FD"/>
    <path d="M7 18 Q9 16 11 18 Q12 21 10 23 Q8 23 7 21 Q6 19 7 18Z" fill="#60A5FA"/>
  </g>

  <!-- Sheen -->
  <ellipse cx="14" cy="13" rx="10" ry="7" fill="url(#sheen)" clip-path="url(#gc)"/>

  <!-- Globe ring -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="#1D4ED8" stroke-width="0.8"/>

  <!-- Pin -->
  <circle cx="25" cy="15" r="4" fill="#ffffff"/>
  <circle cx="25" cy="15" r="2.2" fill="#2563EB"/>
  <line x1="25" y1="19" x2="25" y2="24" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="25" cy="25" r="1.2" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="44" y="24"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18"
        font-weight="700"
        fill="#0F172A"
        letter-spacing="-0.5">Jobs</text>
  <text x="93" y="24"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#2563EB"
        letter-spacing="1.5">Worldwide</text>
</svg>
