<svg width="220" height="40" viewBox="0 0 220 40" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JobsWorldwide</title>
  <defs>
    <clipPath id="gcn">
      <circle cx="20" cy="20" r="18"/>
    </clipPath>
  </defs>

  <!-- Globe -->
  <circle cx="20" cy="20" r="18" fill="#1B1812"/>

  <!-- Grid lines -->
  <g clip-path="url(#gcn)" fill="none" stroke="#3A3528" stroke-width="1">
    <ellipse cx="20" cy="20" rx="18" ry="5"/>
    <ellipse cx="20" cy="20" rx="18" ry="11"/>
    <line x1="2" y1="20" x2="38" y2="20"/>
    <ellipse cx="20" cy="20" rx="5" ry="18"/>
    <ellipse cx="20" cy="20" rx="11" ry="18"/>
    <line x1="20" y1="2" x2="20" y2="38"/>
  </g>
  <circle cx="20" cy="20" r="18" fill="none" stroke="#3A3528" stroke-width="1.5"/>

  <!-- Pin -->
  <circle cx="20" cy="14" r="5" fill="#A32B1F"/>
  <circle cx="20" cy="14" r="2.2" fill="#1B1812"/>
  <path d="M20 20 L16 15.5 Q12 10 20 8 Q28 10 24 15.5 Z" fill="#A32B1F"/>

  <!-- "Jobs" -->
  <text x="46" y="18"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="18" font-weight="700" fill="#1B1812" letter-spacing="-0.3">Jobs</text>

  <!-- "Worldwide" -->
  <text x="47" y="31"
    font-family="'IBM Plex Mono', ui-monospace, monospace"
    font-size="9" font-weight="500" fill="#A32B1F" letter-spacing="2.2">WORLDWIDE</text>
</svg>
