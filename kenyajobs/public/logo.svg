<svg width="680" height="240" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JobsWorldwide</title>
  <desc>JobsWorldwide logo — globe icon with location pin and bold wordmark</desc>

  <defs>
    <clipPath id="gc">
      <circle cx="108" cy="120" r="84"/>
    </clipPath>
  </defs>

  <!-- Globe -->
  <circle cx="108" cy="120" r="84" fill="#0b2233"/>

  <!-- Latitude lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#1e4a6e" stroke-width="1.5">
    <ellipse cx="108" cy="120" rx="84" ry="24"/>
    <ellipse cx="108" cy="120" rx="84" ry="50"/>
    <line x1="24" y1="120" x2="192" y2="120"/>
    <line x1="24" y1="83" x2="192" y2="83"/>
    <line x1="24" y1="157" x2="192" y2="157"/>
  </g>

  <!-- Longitude lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#1e4a6e" stroke-width="1.5">
    <ellipse cx="108" cy="120" rx="24" ry="84"/>
    <ellipse cx="108" cy="120" rx="50" ry="84"/>
    <line x1="108" y1="36" x2="108" y2="204"/>
  </g>

  <!-- Globe border -->
  <circle cx="108" cy="120" r="84" fill="none" stroke="#1e4a6e" stroke-width="2"/>

  <!-- Location pin -->
  <circle cx="108" cy="100" r="21" fill="#f2a93c"/>
  <circle cx="108" cy="100" r="9" fill="#0b2233"/>
  <path d="M108 122 L97 107 Q86 92 108 78 Q130 92 119 107 Z" fill="#f2a93c"/>

  <!-- "Jobs" wordmark -->
  <text x="216" y="104"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="70" font-weight="700" fill="#0b2233" letter-spacing="-2">Jobs</text>

  <!-- Divider -->
  <rect x="216" y="116" width="332" height="2" fill="#e2e8f0" rx="1"/>

  <!-- "Worldwide" wordmark -->
  <text x="219" y="156"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="36" font-weight="500" fill="#f2a93c" letter-spacing="5">Worldwide</text>

  <!-- Tagline -->
  <text x="220" y="188"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="13" font-weight="400" fill="#8b94a0" letter-spacing="2.5">Africa · Remote · Worldwide</text>
</svg>
